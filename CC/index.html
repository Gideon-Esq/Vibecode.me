<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: 'var(--color-bg)',
            card: 'var(--color-card)',
            text: 'var(--color-text)',
            muted: 'var(--color-muted)',
            primary: 'var(--color-primary)',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      :root {
        --color-bg: #f3f4f6;
        --color-card: #ffffff;
        --color-text: #111827;
        --color-muted: #6b7280;
        --color-primary: #3b82f6;
      }
      .dark {
        --color-bg: #0f1219;
        --color-card: #1f232b;
        --color-text: #f9fafb;
        --color-muted: #9ca3af;
        --color-primary: #3b82f6;
      }
      body {
        @apply bg-bg text-text transition-colors duration-200;
      }
      /* Hide arrows in number input */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-muted);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-text);
      }
    }
  </style>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // Helper component to render Lucide icons in React without a bundler
    const Icon = ({ name, size = 24, className = '', ...props }) => {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current && window.lucide) {
          iconRef.current.innerHTML = ''; // Clear previous icon
          const iconElement = document.createElement('i');
          iconElement.setAttribute('data-lucide', name);
          if (className) iconElement.setAttribute('class', className);
          iconElement.style.width = `${size}px`;
          iconElement.style.height = `${size}px`;
          iconRef.current.appendChild(iconElement);
          window.lucide.createIcons({
            root: iconRef.current,
            attrs: {
              width: size,
              height: size,
              ...props
            }
          });
        }
      }, [name, size, className, props]);

      return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
    };

    const getFlagEmoji = (currencyCode) => {
      const currencyToCountry = {
        "EUR": "EU", "AED": "AE", "AFN": "AF", "XCD": "AG", "ALL": "AL", "AMD": "AM",
        "AOA": "AO", "ARS": "AR", "USD": "US", "AUD": "AU", "AWG": "AW", "AZN": "AZ",
        "BAM": "BA", "BBD": "BB", "BDT": "BD", "XOF": "BF", "BGN": "BG", "BHD": "BH",
        "BIF": "BI", "BMD": "BM", "BND": "BN", "BOB": "BO", "BRL": "BR", "BSD": "BS",
        "BTN": "BT", "NOK": "BV", "BWP": "BW", "BYN": "BY", "BZD": "BZ", "CAD": "CA",
        "CDF": "CD", "XAF": "CF", "CHF": "CH", "NZD": "CK", "CLP": "CL", "CNY": "CN",
        "COP": "CO", "CRC": "CR", "CUP": "CU", "CVE": "CV", "ANG": "CW", "CZK": "CZ",
        "DJF": "DJ", "DKK": "DK", "DOP": "DO", "DZD": "DZ", "EGP": "EG", "MAD": "EH",
        "ERN": "ER", "ETB": "ET", "FJD": "FJ", "FKP": "FK", "GBP": "GB", "GEL": "GE",
        "GHS": "GH", "GIP": "GI", "GMD": "GM", "GNF": "GN", "GTQ": "GT", "GYD": "GY",
        "HKD": "HK", "HNL": "HN", "HTG": "HT", "HUF": "HU", "IDR": "ID", "ILS": "IL",
        "INR": "IN", "IQD": "IQ", "IRR": "IR", "ISK": "IS", "JMD": "JM", "JOD": "JO",
        "JPY": "JP", "KES": "KE", "KGS": "KG", "KHR": "KH", "KMF": "KM", "KPW": "KP",
        "KRW": "KR", "KWD": "KW", "KYD": "KY", "KZT": "KZ", "LAK": "LA", "LBP": "LB",
        "LKR": "LK", "LRD": "LR", "LSL": "LS", "LYD": "LY", "MDL": "MD", "MGA": "MG",
        "MKD": "MK", "MMK": "MM", "MNT": "MN", "MOP": "MO", "MRU": "MR", "MUR": "MU",
        "MVR": "MV", "MWK": "MW", "MXN": "MX", "MYR": "MY", "MZN": "MZ", "NAD": "NA",
        "XPF": "NC", "NGN": "NG", "NIO": "NI", "NPR": "NP", "OMR": "OM", "PAB": "PA",
        "PEN": "PE", "PGK": "PG", "PHP": "PH", "PKR": "PK", "PLN": "PL", "PYG": "PY",
        "QAR": "QA", "RON": "RO", "RSD": "RS", "RUB": "RU", "RWF": "RW", "SAR": "SA",
        "SBD": "SB", "SCR": "SC", "SDG": "SD", "SEK": "SE", "SGD": "SG", "SHP": "SH",
        "SLL": "SL", "SOS": "SO", "SRD": "SR", "SSP": "SS", "STN": "ST", "SYP": "SY",
        "SZL": "SZ", "THB": "TH", "TJS": "TJ", "TMT": "TM", "TND": "TN", "TOP": "TO",
        "TRY": "TR", "TTD": "TT", "TWD": "TW", "TZS": "TZ", "UAH": "UA", "UGX": "UG",
        "UYU": "UY", "UZS": "UZ", "VES": "VE", "VND": "VN", "VUV": "VU", "WST": "WS",
        "YER": "YE", "ZAR": "ZA", "ZMW": "ZM", "ZWL": "ZW"
      };

      const countryCode = currencyToCountry[currencyCode.toUpperCase()];
      if (!countryCode) return "🏳️";
      if (countryCode === "EU") return "🇪🇺";

      return countryCode
        .toUpperCase()
        .replace(/./g, char => String.fromCodePoint(char.charCodeAt(0) + 127397));
    };

    const formatCurrency = (value, currencyCode) => {
      if (value === null || value === undefined || isNaN(value)) return "–";

      const noDecimals = ['JPY', 'KRW', 'BIF', 'CLP', 'DJF', 'GNF', 'ISK', 'KMF', 'PYG', 'RWF', 'UGX', 'VND', 'VUV', 'XAF', 'XOF', 'XPF'];
      const threeDecimals = ['BHD', 'IQD', 'JOD', 'KWD', 'LYD', 'OMR', 'TND'];

      let maxDecimals = 2;
      let minDecimals = 2;

      if (noDecimals.includes(currencyCode.toUpperCase())) {
        maxDecimals = 0;
        minDecimals = 0;
      } else if (threeDecimals.includes(currencyCode.toUpperCase())) {
        maxDecimals = 3;
        minDecimals = 3;
      }

      // Handle very small numbers dynamically if less than 0.01 but not 0
      if (value > 0 && value < 0.01 && !noDecimals.includes(currencyCode.toUpperCase())) {
         minDecimals = 4;
         maxDecimals = 6;
      }

      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits: minDecimals,
        maximumFractionDigits: maxDecimals,
      }).format(value);
    };


    const CurrencySelector = ({ label, currency, setCurrency, amount, setAmount, currencies, isReadOnly }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [searchTerm, setSearchTerm] = useState("");

      const handleCurrencyChange = (curr) => {
        setCurrency(curr.toUpperCase());
        setIsOpen(false);
        setSearchTerm("");
      };

      const filteredCurrencies = Object.entries(currencies).filter(([code, name]) =>
        code.toLowerCase().includes(searchTerm.toLowerCase()) ||
        name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      return (
        <div className="bg-[#1f232b] dark:bg-[#1f232b] bg-white rounded-xl p-4 border border-gray-800 relative">
          <label className="text-muted text-sm mb-2 block">{label}</label>
          <div className="flex items-center justify-between">
            <button
              onClick={() => setIsOpen(!isOpen)}
              className="flex items-center space-x-2 bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-lg transition-colors"
            >
              <span className="text-xl">{getFlagEmoji(currency)}</span>
              <span className="font-semibold text-text">{currency}</span>
              <Icon name="chevron-down" size={16} className="text-muted" />
            </button>
            <input
              type={isReadOnly ? "text" : "number"}
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              readOnly={isReadOnly}
              className={`bg-transparent text-right text-2xl font-bold w-1/2 outline-none ${isReadOnly ? 'text-muted' : 'text-text'}`}
              placeholder="0.00"
            />
          </div>

          {isOpen && (
            <div className="absolute top-full left-0 mt-2 w-full bg-[#252a34] border border-gray-700 rounded-xl shadow-2xl z-50 max-h-64 flex flex-col">
              <div className="p-3 border-b border-gray-700 sticky top-0 bg-[#252a34] rounded-t-xl z-10">
                <div className="relative">
                  <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-muted" />
                  <input
                    type="text"
                    placeholder="Search currency or country..."
                    className="w-full bg-gray-800 text-text rounded-lg pl-9 pr-3 py-2 text-sm outline-none border border-gray-700 focus:border-primary transition-colors"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>
              </div>
              <div className="overflow-y-auto flex-1 p-2">
                {filteredCurrencies.map(([code, name]) => (
                  <button
                    key={code}
                    onClick={() => handleCurrencyChange(code)}
                    className="w-full flex items-center justify-between p-3 hover:bg-gray-800 rounded-lg transition-colors text-left"
                  >
                    <div className="flex items-center space-x-3">
                      <span className="text-2xl">{getFlagEmoji(code)}</span>
                      <div>
                        <div className="font-semibold text-text uppercase">{code}</div>
                        <div className="text-xs text-muted truncate max-w-[150px]">{name}</div>
                      </div>
                    </div>
                    {currency.toLowerCase() === code.toLowerCase() && (
                      <Icon name="check" size={16} className="text-primary" />
                    )}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [currencies, setCurrencies] = useState({});
      const [rates, setRates] = useState(null);
      const [ratesDate, setRatesDate] = useState("");

      const [fromCurrency, setFromCurrency] = useState("USD");
      const [toCurrency, setToCurrency] = useState("NGN");
      const [amount, setAmount] = useState("1000");
      const [convertedAmount, setConvertedAmount] = useState("0");
      const [activeTab, setActiveTab] = useState("converter"); // converter, markets, history, settings
      const [history, setHistory] = useState([]);

      const [isDarkMode, setIsDarkMode] = useState(() => {
        return localStorage.getItem('theme') === 'dark';
      });

      const fetchCurrenciesAndRates = async () => {
        try {
          // Fetch currency list
          const currRes = await fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies.json");
          const currData = await currRes.json();
          setCurrencies(currData);

          // Fetch initial rates for base USD
          const ratesRes = await fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json");
          const ratesData = await ratesRes.json();
          setRates(ratesData.usd);
          setRatesDate(ratesData.date);
        } catch (e) {
          console.error("Failed to fetch currencies/rates", e);
          const toast = document.createElement('div');
          toast.className = 'fixed top-4 right-4 bg-red-500 text-white px-4 py-2 rounded shadow-lg z-50 text-sm animate-bounce';
          toast.innerText = 'Could not refresh rates – showing last known data.';
          document.body.appendChild(toast);
          setTimeout(() => document.body.removeChild(toast), 3000);
        }
      };

      useEffect(() => {
        fetchCurrenciesAndRates();
        const interval = setInterval(fetchCurrenciesAndRates, 60000);
        return () => clearInterval(interval);
      }, []);

      const handleConvert = () => {
        if (!rates || !amount || isNaN(amount)) return;
        const baseRate = rates[fromCurrency.toLowerCase()];
        const targetRate = rates[toCurrency.toLowerCase()];

        if (baseRate && targetRate) {
          // Convert from base to USD first, then to target
          const amountInUSD = amount / baseRate;
          const finalAmount = amountInUSD * targetRate;
          setConvertedAmount(finalAmount);

          // Save to history
          const newHistory = [{
             id: Date.now(),
             date: new Date().toLocaleDateString(),
             time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
             fromAmount: amount,
             fromCurr: fromCurrency,
             toAmount: finalAmount,
             toCurr: toCurrency,
             rate: targetRate / baseRate
          }, ...history].slice(0, 50); // keep last 50
          setHistory(newHistory);
        }
      };

      const handleSwap = () => {
        setFromCurrency(toCurrency);
        setToCurrency(fromCurrency);
        setAmount(convertedAmount || amount);
        setConvertedAmount(amount);
      };

      // Sparkline mockup
      const generateSparkline = () => {
        return "M 0 40 Q 10 35, 20 40 T 40 30 T 60 35 T 80 20 T 100 10";
      };

      useEffect(() => {
        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
          setIsDarkMode(true);
        } else {
          setIsDarkMode(false);
        }

        // Load history from localStorage
        const savedHistory = localStorage.getItem('cc_history');
        if (savedHistory) {
          try {
            setHistory(JSON.parse(savedHistory));
          } catch (e) {}
        }
      }, []);

      useEffect(() => {
        if (isDarkMode) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDarkMode]);

      useEffect(() => {
        localStorage.setItem('cc_history', JSON.stringify(history));
      }, [history]);

      const currentRate = rates && rates[fromCurrency.toLowerCase()] && rates[toCurrency.toLowerCase()]
        ? rates[toCurrency.toLowerCase()] / rates[fromCurrency.toLowerCase()]
        : 0;

      return (
        <div className="flex flex-col min-h-screen max-w-md mx-auto relative bg-bg border-x border-card shadow-xl overflow-hidden font-sans">
          <header className="p-4 flex items-center justify-between border-b border-card bg-bg z-10 sticky top-0">
            <h1 className="text-xl font-bold text-text">Converter</h1>
            <button className="text-muted hover:text-text transition-colors">
              <Icon name="bell" size={20} />
            </button>
          </header>

          <main className="flex-1 overflow-y-auto pb-20 p-4">
            {!rates ? (
              <div className="flex flex-col space-y-4 animate-pulse">
                <div className="h-32 bg-card rounded-xl"></div>
                <div className="h-48 bg-card rounded-xl"></div>
              </div>
            ) : (
              <>
                {activeTab === "converter" && (
                  <div className="space-y-6">
                    <div className="relative bg-card rounded-2xl p-1 shadow-sm border border-gray-800">
                      <CurrencySelector
                        label="You pay"
                        currency={fromCurrency}
                        setCurrency={setFromCurrency}
                        amount={amount}
                        setAmount={setAmount}
                        currencies={currencies}
                        isReadOnly={false}
                      />

                      <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10">
                        <button
                          onClick={handleSwap}
                          className="bg-card border border-gray-700 rounded-full p-2 hover:bg-gray-800 transition-transform active:scale-95 shadow-md group"
                        >
                          <Icon name="arrow-up-down" size={20} className="text-primary group-hover:rotate-180 transition-transform duration-300" />
                        </button>
                      </div>

                      <div className="mt-2">
                        <CurrencySelector
                          label="You receive"
                          currency={toCurrency}
                          setCurrency={setToCurrency}
                          amount={formatCurrency(convertedAmount, toCurrency)}
                          setAmount={() => {}}
                          currencies={currencies}
                          isReadOnly={true}
                        />
                      </div>
                    </div>

                    <div className="flex items-center justify-between px-2">
                      <div className="text-sm text-muted">
                        1 {fromCurrency} = {formatCurrency(currentRate, toCurrency)} {toCurrency}
                        <br />
                        1 {toCurrency} = {formatCurrency(1 / currentRate, fromCurrency)} {fromCurrency}
                      </div>
                      <div className="text-sm text-primary flex items-center gap-1">
                        <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        Live Rate
                      </div>
                    </div>

                    <button
                      onClick={handleConvert}
                      className="w-full bg-primary hover:bg-blue-600 text-white font-semibold py-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98]"
                    >
                      Convert Now
                    </button>

                    <div className="bg-card rounded-2xl p-4 border border-gray-800 shadow-sm mt-4">
                      <div className="flex justify-between items-center mb-4">
                        <h3 className="text-sm font-medium text-muted">{fromCurrency}/{toCurrency} Trend (7d)</h3>
                        <span className="text-sm text-green-400 flex items-center gap-1">
                          <Icon name="trending-up" size={14} /> +1.2%
                        </span>
                      </div>
                      <div className="h-24 w-full relative">
                        <svg viewBox="0 0 100 50" preserveAspectRatio="none" className="w-full h-full">
                          <path
                            d={generateSparkline()}
                            fill="none"
                            stroke="#3b82f6"
                            strokeWidth="3"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                          />
                          <path
                            d={`${generateSparkline()} L 100 50 L 0 50 Z`}
                            fill="url(#gradient)"
                            opacity="0.2"
                          />
                          <defs>
                            <linearGradient id="gradient" x1="0" x2="0" y1="0" y2="1">
                              <stop offset="0%" stopColor="#3b82f6" />
                              <stop offset="100%" stopColor="transparent" />
                            </linearGradient>
                          </defs>
                        </svg>
                      </div>
                      <div className="flex justify-between text-xs text-muted mt-2">
                        <span>{formatCurrency(currentRate * 0.98, toCurrency)}</span>
                        <span>{formatCurrency(currentRate * 1.02, toCurrency)}</span>
                      </div>
                    </div>
                  </div>
                )}
                {activeTab === "markets" && (
                  <div className="space-y-4">
                    <h2 className="text-lg font-semibold text-text mb-4">Compare Rates (1 {fromCurrency})</h2>
                    <div className="bg-card border border-gray-800 rounded-xl overflow-hidden shadow-sm">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-gray-800/50 border-b border-gray-800 text-muted text-xs uppercase">
                            <th className="p-3 font-medium">Currency</th>
                            <th className="p-3 font-medium text-right">Amount</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-800/50">
                          {['USD', 'EUR', 'GBP', 'JPY', 'CAD', 'AUD', 'CHF', 'CNY', 'INR', 'NGN'].map((targetCurr) => {
                            if (targetCurr === fromCurrency) return null;
                            const tRate = rates[targetCurr.toLowerCase()];
                            const bRate = rates[fromCurrency.toLowerCase()];
                            if (!tRate || !bRate) return null;

                            const val = (1 / bRate) * tRate;

                            return (
                              <tr key={targetCurr} className="hover:bg-gray-800/30 transition-colors">
                                <td className="p-3 flex items-center space-x-3">
                                  <span className="text-xl">{getFlagEmoji(targetCurr)}</span>
                                  <div>
                                    <div className="font-semibold text-text">{targetCurr}</div>
                                    <div className="text-xs text-muted truncate max-w-[120px]">{currencies[targetCurr.toLowerCase()]}</div>
                                  </div>
                                </td>
                                <td className="p-3 text-right font-medium text-text">
                                  {formatCurrency(val, targetCurr)}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
                {activeTab === "history" && (
                  <div className="space-y-4">
                    <div className="flex items-center justify-between mb-4">
                       <h2 className="text-lg font-semibold text-text">Conversion History</h2>
                       {history.length > 0 && (
                          <button
                            onClick={() => setHistory([])}
                            className="text-xs text-red-400 hover:text-red-300 transition-colors"
                          >
                            Clear All
                          </button>
                       )}
                    </div>

                    {history.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-12 text-muted">
                        <Icon name="clock-3" size={48} className="mb-4 opacity-50" />
                        <p>No conversion history yet</p>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {history.map((item) => (
                          <div key={item.id} className="bg-card border border-gray-800 rounded-xl p-4 shadow-sm hover:border-gray-700 transition-colors">
                            <div className="flex justify-between items-center mb-2">
                              <span className="text-xs text-muted flex items-center gap-1">
                                <Icon name="clock" size={12} /> {item.date} {item.time}
                              </span>
                              <span className="text-xs bg-gray-800 text-blue-400 px-2 py-1 rounded-md">
                                Rate: {formatCurrency(item.rate, item.toCurr)}
                              </span>
                            </div>
                            <div className="flex items-center justify-between mt-2">
                              <div className="flex flex-col">
                                <span className="text-lg font-bold text-text">{formatCurrency(item.fromAmount, item.fromCurr)}</span>
                                <span className="text-xs text-muted font-medium">{item.fromCurr}</span>
                              </div>
                              <Icon name="arrow-right" size={16} className="text-muted" />
                              <div className="flex flex-col text-right">
                                <span className="text-lg font-bold text-text">{formatCurrency(item.toAmount, item.toCurr)}</span>
                                <span className="text-xs text-muted font-medium">{item.toCurr}</span>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
                {activeTab === "settings" && (
                  <div className="space-y-4">
                    <h2 className="text-lg font-semibold text-text mb-4">Settings</h2>

                    <div className="bg-card border border-gray-800 rounded-xl overflow-hidden shadow-sm divide-y divide-gray-800/50">
                      <div className="p-4 flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                          <div className="p-2 bg-gray-800 rounded-lg text-primary">
                            <Icon name={isDarkMode ? "moon" : "sun"} size={20} />
                          </div>
                          <div>
                            <div className="font-medium text-text">Dark Mode</div>

                        <button

                        >
                          <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-transform ${isDarkMode ? 'left-7' : 'left-1'}`} />

                      </div>

                      <div className="p-4 flex items-center justify-between hover:bg-gray-800/30 cursor-pointer transition-colors">

                            <Icon name="bell" size={20} />
                          </div>
                          <div>

                            <div className="text-xs text-muted">Rate alerts & updates</div>

                      <div className="p-4 flex items-center justify-between hover:bg-gray-800/30 cursor-pointer transition-colors">
                        <div className="flex items-center space-x-3">
                          <div className="p-2 bg-gray-800 rounded-lg text-primary">
                            <Icon name="info" size={20} />
                          </div>
                          <div>
                            <div className="font-medium text-text">About App</div>
                            <div className="text-xs text-muted">Version 1.0.0</div>
                          </div>
                        </div>
                        <Icon name="chevron-right" size={20} className="text-muted" />
                      </div>
                    </div>
                  </div>
                )}
              </>
            )}
          </main>

          <nav className="fixed bottom-0 w-full max-w-md bg-card border-t border-card flex justify-around items-center pb-safe text-xs text-muted">
            <button
              onClick={() => setActiveTab("converter")}
              className={`flex flex-col items-center p-3 flex-1 ${activeTab === "converter" ? "text-primary border-t-2 border-primary" : "hover:text-text"} transition-all`}
            >
              <Icon name="arrow-left-right" size={20} className="mb-1" />
              <span>Converter</span>
            </button>
            <button
              onClick={() => setActiveTab("markets")}
              className={`flex flex-col items-center p-3 flex-1 ${activeTab === "markets" ? "text-primary border-t-2 border-primary" : "hover:text-text"} transition-all`}
            >
              <Icon name="bar-chart-2" size={20} className="mb-1" />

            <button

              className={`flex flex-col items-center p-3 flex-1 ${activeTab === "history" ? "text-primary border-t-2 border-primary" : "hover:text-text"} transition-all`}
            >
              <Icon name="history" size={20} className="mb-1" />
              <span>History</span>
            </button>
            <button
              onClick={() => setActiveTab("settings")}
              className={`flex flex-col items-center p-3 flex-1 ${activeTab === "settings" ? "text-primary border-t-2 border-primary" : "hover:text-text"} transition-all`}
            >
              <Icon name="settings" size={20} className="mb-1" />
              <span>Settings</span>
            </button>
          </nav>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
